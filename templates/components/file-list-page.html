{% if has_more and last_id %}
    <div id="load-more-container">
        <button
            class="button"
            hx-get="{{ url_for('list_files') }}?after={{ last_id }}"
            hx-target="#load-more-container"
            hx-swap="outerHTML"
            hx-indicator="#list-indicator">
            Load More
        </button>
    </div>
{% else %}
    <div id="load-more-container"></div>
{% endif %}
<ul id="file-list-items" hx-swap-oob="beforeend:#file-list-items">
    {% for file in files %}
        <li class="fileItem">
            <span>{{ file.filename }} - Status: <strong>{{ file.status }}</strong></span>
            {% if file.last_error %}
                <span class="errorMessage">Error: {{ file.last_error }}</span>
            {% endif %}
            <button
                class="button deleteButton"
                hx-delete="{{ url_for('delete_file', file_id=file.id) }}"
                hx-target="#file-list-container"
                hx-swap="outerHTML"
                hx-confirm="Are you sure you want to delete {{ file.filename }}?"
                hx-indicator="#list-indicator">
                Delete
            </button>
        </li>
    {% endfor %}
</ul>
